<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4M Tracker Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #16213e, #0f3460);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #e94560;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 28px;
            color: #fff;
            letter-spacing: 1px;
        }

        .header .subtitle {
            color: #a0a0a0;
            font-size: 14px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .edit-toggle {
            padding: 8px 18px;
            background: #e94560;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .edit-toggle:hover {
            background: #c23050;
        }

        .edit-toggle.editing {
            background: #4ecdc4;
        }

        .edit-toggle.editing:hover {
            background: #2ea89e;
        }

        .save-notice {
            font-size: 12px;
            color: #4ecdc4;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .save-notice.show {
            opacity: 1;
        }

        .tabs {
            display: flex;
            gap: 8px;
            padding: 20px 40px 0;
            background: #16213e;
        }

        .tab {
            padding: 12px 28px;
            background: #0f3460;
            border: 1px solid #1a4080;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: #a0a0a0;
            transition: all 0.3s;
        }

        .tab:hover {
            background: #1a4080;
            color: #fff;
        }

        .tab.active {
            background: #1a1a2e;
            color: #e94560;
            border-color: #e94560;
            border-bottom: 2px solid #1a1a2e;
            margin-bottom: -2px;
        }

        .dashboard {
            padding: 30px 40px;
        }

        .fc-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .fc-header h2 {
            font-size: 32px;
            color: #e94560;
        }

        .departments {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .dept-card {
            background: #16213e;
            border-radius: 12px;
            border: 1px solid #1a4080;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .dept-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .dept-card-header {
            background: #0f3460;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a4080;
        }

        .dept-card-header h3 {
            font-size: 16px;
            color: #fff;
        }

        .dept-card-header .volume-info {
            font-size: 12px;
            color: #a0a0a0;
        }

        .dept-table {
            width: 100%;
            border-collapse: collapse;
        }

        .dept-table th {
            background: #0d2847;
            padding: 10px 14px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #7a8fa6;
            border-bottom: 1px solid #1a4080;
        }

        .dept-table td {
            padding: 9px 14px;
            font-size: 13px;
            border-bottom: 1px solid #0f3460;
        }

        .dept-table tr:hover {
            background: #1a3a5c;
        }

        .dept-table .item-name {
            color: #d0d0d0;
            max-width: 180px;
        }

        .dept-table .num {
            text-align: center;
            font-weight: 600;
            min-width: 50px;
        }

        .delta-positive { color: #4ecdc4; }
        .delta-negative { color: #e94560; font-weight: 700; }
        .delta-zero { color: #666; }
        .delta-note { color: #f9a825; font-size: 11px; }

        /* Editable input fields */
        .edit-input {
            width: 65px;
            padding: 4px 6px;
            background: #0d2847;
            border: 1px solid #1a4080;
            border-radius: 4px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            transition: border-color 0.3s;
        }

        .edit-input:focus {
            outline: none;
            border-color: #e94560;
            background: #162d50;
        }

        .edit-input::-webkit-inner-spin-button {
            opacity: 0.5;
        }

        /* Site Requirements Section */
        .site-requirements {
            margin-top: 30px;
            background: #16213e;
            border-radius: 12px;
            border: 1px solid #e94560;
            overflow: hidden;
        }

        .site-requirements-header {
            background: linear-gradient(135deg, #e94560, #c23050);
            padding: 14px 20px;
        }

        .site-requirements-header h3 {
            color: #fff;
            font-size: 18px;
        }

        .site-req-table {
            width: 100%;
            border-collapse: collapse;
        }

        .site-req-table th {
            background: #0d2847;
            padding: 12px 16px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #7a8fa6;
        }

        .site-req-table td {
            padding: 10px 16px;
            font-size: 13px;
            border-bottom: 1px solid #0f3460;
        }

        .site-req-table tr:hover {
            background: #1a3a5c;
        }

        /* Summary bar */
        .summary-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .summary-card {
            background: #16213e;
            border: 1px solid #1a4080;
            border-radius: 10px;
            padding: 18px 24px;
            min-width: 160px;
            text-align: center;
        }

        .summary-card .label {
            font-size: 12px;
            color: #7a8fa6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .summary-card .value {
            font-size: 26px;
            font-weight: 700;
        }

        .summary-card .value.red { color: #e94560; }
        .summary-card .value.green { color: #4ecdc4; }
        .summary-card .value.yellow { color: #f9a825; }
        .summary-card .value.blue { color: #5dade2; }

        .notes-section {
            margin-top: 15px;
            background: #0f3460;
            border-radius: 8px;
            padding: 14px 20px;
            border-left: 4px solid #f9a825;
        }

        .notes-section h4 {
            color: #f9a825;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .notes-section p {
            font-size: 12px;
            color: #a0a0a0;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .header { padding: 15px 20px; flex-wrap: wrap; gap: 10px; }
            .tabs { padding: 15px 20px 0; flex-wrap: wrap; }
            .dashboard { padding: 20px; }
            .departments { grid-template-columns: 1fr; }
            .tab { padding: 10px 16px; font-size: 13px; }
        }
    </style>
</head>
<body>

};

// ============ STATE ============
let editMode = false;
let currentFC = 'auh1';

// Load saved data from localStorage or use defaults
function loadData() {
    const saved = localStorage.getItem('4m-tracker-data');
    if (saved) {
        return JSON.parse(saved);
    }
    return JSON.parse(JSON.stringify(defaultData));
}

function saveData(data) {
    localStorage.setItem('4m-tracker-data', JSON.stringify(data));
    const notice = document.getElementById('saveNotice');
    notice.classList.add('show');
    setTimeout(() => notice.classList.remove('show'), 2000);
}

let data = loadData();

// ============ RENDERING ============
function getDeltaClass(delta) {
    if (delta === null || delta === undefined || isNaN(delta)) return 'delta-zero';
    if (delta > 0) return 'delta-negative';
    if (delta < 0) return 'delta-positive';
    return 'delta-zero';
}

function formatDelta(current, required) {
    const c = parseInt(current);
    const r = parseInt(required);
    if (isNaN(c) || isNaN(r)) return '<span class="delta-zero">—</span>';
    const delta = r - c;
    const prefix = delta > 0 ? '+' : '';
    return `<span class="${getDeltaClass(delta)}">${prefix}${delta}</span>`;
}

function calculateSummary(fc) {
    let totalItems = 0;
    let shortages = 0;
    let surplus = 0;
    let totalDeficit = 0;

    Object.values(fc.departments).forEach(items => {
        items.forEach(item => {
            totalItems++;
            const c = parseInt(item.current);
            const r = parseInt(item.required);
            if (!isNaN(c) && !isNaN(r)) {
                const delta = r - c;
                if (delta > 0) {
                    shortages++;
                    totalDeficit += delta;
                } else if (delta < 0) {
                    surplus++;
                }
            }
        });
    });

    return { totalItems, shortages, surplus, totalDeficit };
}

function renderFC(fcKey) {
    currentFC = fcKey;
    const fc = data[fcKey];
    const summary = calculateSummary(fc);
    const dashboard = document.getElementById('dashboard');

    let html = `
        <div class="fc-header">
            <h2>${fc.name}</h2>
        </div>
        <div class="summary-bar">
            <div class="summary-card">
                <div class="label">Total Items Tracked</div>
                <div class="value blue">${summary.totalItems}</div>
            </div>
            <div class="summary-card">
                <div class="label">Items in Shortage</div>
                <div class="value red">${summary.shortages}</div>
            </div>
            <div class="summary-card">
                <div class="label">Items Surplus</div>
                <div class="value green">${summary.surplus}</div>
            </div>
            <div class="summary-card">
                <div class="label">Total Deficit</div>
                <div class="value yellow">${summary.totalDeficit}</div>
            </div>
        </div>
        <div class="departments">
    `;

    Object.entries(fc.departments).forEach(([deptName, items]) => {
        html += `
            <div class="dept-card">
                <div class="dept-card-header">
                    <h3>${deptName}</h3>
                    <div class="volume-info">${items.length} items</div>
                </div>
                <table class="dept-table">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th style="text-align:center">Available</th>
                            <th style="text-align:center">Required</th>
                            <th style="text-align:center">Delta</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        items.forEach((item, idx) => {
            if (editMode) {
                html += `
                    <tr>
                        <td class="item-name">${item.item}</td>
                        <td class="num"><input type="number" class="edit-input" value="${item.current}" onchange="updateValue('${fcKey}', '${deptName}', ${idx}, 'current', this.value)"></td>
                        <td class="num"><input type="number" class="edit-input" value="${item.required}" onchange="updateValue('${fcKey}', '${deptName}', ${idx}, 'required', this.value)"></td>
                        <td class="num">${formatDelta(item.current, item.required)}</td>
                    </tr>
                `;
            } else {
                html += `
                    <tr>
                        <td class="item-name">${item.item}</td>
                        <td class="num">${item.current}</td>
                        <td class="num">${item.required}</td>
                        <td class="num">${formatDelta(item.current, item.required)}</td>
                    </tr>
                `;
            }
        });

        html += `</tbody></table></div>`;
    });

    html += `</div>`;

    // Shared Assets (DXB5)
    if (fc.sharedAssets) {
        html += `
            <div class="site-requirements" style="margin-top: 20px;">
                <div class="site-requirements-header" style="background: linear-gradient(135deg, #4ecdc4, #2ea89e);">
                    <h3>Shared Assets</h3>
                </div>
                <table class="site-req-table">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th style="text-align:center">Available</th>
                            <th style="text-align:center">Required</th>
                            <th style="text-align:center">Delta</th>
                        </tr>
                    </thead>
                    <tbody>
        `;
        fc.sharedAssets.forEach((item, idx) => {
            if (editMode) {
                html += `
                    <tr>
                        <td class="item-name">${item.item}</td>
                        <td class="num"><input type="number" class="edit-input" value="${item.current}" onchange="updateShared('${fcKey}', ${idx}, 'current', this.value)"></td>
                        <td class="num"><input type="number" class="edit-input" value="${item.required}" onchange="updateShared('${fcKey}', ${idx}, 'required', this.value)"></td>
                        <td class="num">${formatDelta(item.current, item.required)}</td>
                    </tr>
                `;
            } else {
                html += `
                    <tr>
                        <td class="item-name">${item.item}</td>
                        <td class="num">${item.current}</td>
                        <td class="num">${item.required}</td>
                        <td class="num">${formatDelta(item.current, item.required)}</td>
                    </tr>
                `;
            }
        });
        html += `</tbody></table></div>`;
    }

    // Notes
    if (fc.notes && fc.notes.length > 0) {
        html += `
            <div class="notes-section">
                <h4>Notes</h4>
                ${fc.notes.map(n => `<p>• ${n}</p>`).join('')}
            </div>
        `;
    }

    dashboard.innerHTML = html;
}

// ============ EDIT FUNCTIONS ============
function toggleEdit() {
    editMode = !editMode;
    const btn = document.getElementById('editBtn');
    if (editMode) {
        btn.textContent = '💾 Save & Exit Edit';
        btn.classList.add('editing');
    } else {
        btn.textContent = '✏️ Edit Mode';
        btn.classList.remove('editing');
        saveData(data);
    }
    renderFC(currentFC);
}

function updateValue(fcKey, deptName, idx, field, value) {
    const numVal = parseInt(value);
    data[fcKey].departments[deptName][idx][field] = isNaN(numVal) ? 0 : numVal;
    // Auto-save on each change
    saveData(data);
    // Re-render to update delta and summary
    renderFC(fcKey);
}

function updateShared(fcKey, idx, field, value) {
    const numVal = parseInt(value);
    data[fcKey].sharedAssets[idx][field] = isNaN(numVal) ? 0 : numVal;
    saveData(data);
    renderFC(fcKey);
}

function showFC(fcKey, tabEl) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tabEl.classList.add('active');
    renderFC(fcKey);
}

// ============ INITIAL RENDER ============
renderFC('auh1');
    </script>
</body>
