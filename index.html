<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4M Tracker Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #16213e, #0f3460);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #e94560;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 28px;
            color: #fff;
            letter-spacing: 1px;
        }

        .header .subtitle {
            color: #a0a0a0;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            padding: 20px 40px 0;
            background: #16213e;
        }

        .tab {
            padding: 12px 28px;
            background: #0f3460;
            border: 1px solid #1a4080;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: #a0a0a0;
            transition: all 0.3s;
        }

        .tab:hover {
            background: #1a4080;
            color: #fff;
        }

        .tab.active {
            background: #1a1a2e;
            color: #e94560;
            border-color: #e94560;
            border-bottom: 2px solid #1a1a2e;
            margin-bottom: -2px;
        }

        .dashboard {
            padding: 30px 40px;
        }

        .fc-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .fc-header h2 {
            font-size: 32px;
            color: #e94560;
        }

        .fc-header .fc-stats {
            display: flex;
            gap: 15px;
        }

        .stat-badge {
            background: #0f3460;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            border: 1px solid #1a4080;
        }

        .stat-badge span {
            color: #e94560;
            font-weight: 700;
        }

        .departments {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .dept-card {
            background: #16213e;
            border-radius: 12px;
            border: 1px solid #1a4080;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .dept-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .dept-card-header {
            background: #0f3460;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a4080;
        }

        .dept-card-header h3 {
            font-size: 16px;
            color: #fff;
        }

        .dept-card-header .volume-info {
            font-size: 12px;
            color: #a0a0a0;
        }

        .dept-card-header .volume-info span {
            color: #4ecdc4;
            font-weight: 600;
        }

        .dept-table {
            width: 100%;
            border-collapse: collapse;
        }

        .dept-table th {
            background: #0d2847;
            padding: 10px 14px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #7a8fa6;
            border-bottom: 1px solid #1a4080;
        }

        .dept-table td {
            padding: 9px 14px;
            font-size: 13px;
            border-bottom: 1px solid #0f3460;
        }

        .dept-table tr:hover {
            background: #1a3a5c;
        }

        .dept-table .item-name {
            color: #d0d0d0;
            max-width: 180px;
        }

        .dept-table .num {
            text-align: center;
            font-weight: 600;
            min-width: 50px;
        }

        .delta-positive {
            color: #4ecdc4;
        }

        .delta-negative {
            color: #e94560;
            font-weight: 700;
        }

        .delta-zero {
            color: #666;
        }

        .delta-note {
            color: #f9a825;
            font-size: 11px;
        }

        /* Site Requirements Section */
        .site-requirements {
            margin-top: 30px;
            background: #16213e;
            border-radius: 12px;
            border: 1px solid #e94560;
            overflow: hidden;
        }

        .site-requirements-header {
            background: linear-gradient(135deg, #e94560, #c23050);
            padding: 14px 20px;
        }

        .site-requirements-header h3 {
            color: #fff;
            font-size: 18px;
        }

        .site-req-table {
            width: 100%;
            border-collapse: collapse;
        }

        .site-req-table th {
            background: #0d2847;
            padding: 12px 16px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #7a8fa6;
        }

        .site-req-table td {
            padding: 10px 16px;
            font-size: 13px;
            border-bottom: 1px solid #0f3460;
        }

        .site-req-table tr:hover {
            background: #1a3a5c;
        }

        /* Summary bar */
        .summary-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .summary-card {
            background: #16213e;
            border: 1px solid #1a4080;
            border-radius: 10px;
            padding: 18px 24px;
            min-width: 160px;
            text-align: center;
        }

        .summary-card .label {
            font-size: 12px;
            color: #7a8fa6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .summary-card .value {
            font-size: 26px;
            font-weight: 700;
        }

        .summary-card .value.red { color: #e94560; }
        .summary-card .value.green { color: #4ecdc4; }
        .summary-card .value.yellow { color: #f9a825; }
        .summary-card .value.blue { color: #5dade2; }

        .notes-section {
            margin-top: 15px;
            background: #0f3460;
            border-radius: 8px;
            padding: 14px 20px;
            border-left: 4px solid #f9a825;
        }

        .notes-section h4 {
            color: #f9a825;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .notes-section p {
            font-size: 12px;
            color: #a0a0a0;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .header { padding: 15px 20px; }
            .tabs { padding: 15px 20px 0; }
            .dashboard { padding: 20px; }
            .departments { grid-template-columns: 1fr; }
            .tab { padding: 10px 16px; font-size: 13px; }
        }
    </style>
</head>

function getDeltaClass(delta) {
    if (delta === null || delta === undefined) return 'delta-note';
    if (delta < 0) return 'delta-negative';
    if (delta > 0) return 'delta-positive';
    return 'delta-zero';
}

function formatDelta(delta, note) {
    if (note) return `<span class="delta-note">${note}</span>`;
    if (delta === null || delta === undefined) return '<span class="delta-zero">—</span>';
    const prefix = delta > 0 ? '+' : '';
    return `<span class="${getDeltaClass(delta)}">${prefix}${delta}</span>`;
}

function calculateSummary(fc) {
    let totalItems = 0;
    let shortages = 0;
    let surplus = 0;
    let totalDeficit = 0;

    Object.values(fc.departments).forEach(items => {
        items.forEach(item => {
            totalItems++;
            if (typeof item.delta === 'number') {
                if (item.delta < 0) {
                    shortages++;
                    totalDeficit += item.delta;
                } else if (item.delta > 0) {
                    surplus++;
                }
            }
        });
    });

    return { totalItems, shortages, surplus, totalDeficit };
}

                    <td class="num">${item.current}</td>
                    <td class="num">${item.required}</td>
                    <td class="num"><span class="${item.toOrder > 0 ? 'delta-negative' : 'delta-zero'}">${item.toOrder}</span></td>
                </tr>
            `;
        });
        html += `</tbody></table></div>`;
    }

    // Notes
    if (fc.notes && fc.notes.length > 0) {
        html += `
            <div class="notes-section">
                <h4>Notes</h4>
                ${fc.notes.map(n => `<p>• ${n}</p>`).join('')}
            </div>
        `;
    }

    dashboard.innerHTML = html;
}

function showFC(fcKey) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    renderFC(fcKey);
}

// Initial render
renderFC('auh1');
    </script>
</body>
</html>
