            top: 0;
            z-index: 100;

            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {

            border-radius: 10px;

            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 14px;
        }

        .header h1 {

            color: #1e293b;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header .subtitle {
            color: #94a3b8;
            font-size: 13px;
            font-weight: 400;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .edit-toggle {
            padding: 9px 20px;
            background: #6366f1;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .edit-toggle:hover {
            background: #4f46e5;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99,102,241,0.3);
        }

        }

        }

            .summary-bar { grid-template-columns: 1fr 1fr; }

        }

let editMode = false;

function loadData() {
    const saved = localStorage.getItem('4m-tracker-data');
    if (saved) return JSON.parse(saved);
    return JSON.parse(JSON.stringify(defaultData));

function saveData() {
    localStorage.setItem('4m-tracker-data', JSON.stringify(data));

let data = loadData();

// ============ HELPERS ============
function getDeltaClass(delta) {
    if (delta === null || delta === undefined || isNaN(delta)) return 'delta-zero';
    if (delta < 0) return 'delta-positive';
    if (delta > 0) return 'delta-negative';
    return 'delta-zero';
}

function formatDelta(current, required) {
    const c = parseInt(current);
    const r = parseInt(required);
    if (isNaN(c) || isNaN(r)) return '<span class="delta-zero">—</span>';
    const delta = c - r;
    if (delta === 0) return '<span class="delta-zero">0</span>';
    return `<span class="${getDeltaClass(delta)}">${delta}</span>`;
}

function calculateSummary(fc) {
    let totalItems = 0, shortages = 0, surplus = 0, totalDeficit = 0;
    Object.values(fc.departments).forEach(items => {
        items.forEach(item => {
            totalItems++;
            const c = parseInt(item.current);
            const r = parseInt(item.required);
            if (!isNaN(c) && !isNaN(r)) {
                const delta = c - r;
                if (delta < 0) { shortages++; totalDeficit += delta; }
                else if (delta > 0) { surplus++; }
            }
        });
    });
    return { totalItems, shortages, surplus, totalDeficit };
}

function calculateNetworkTotal() {
    const itemMap = {};
    const fcKeys = ['auh1', 'dxb5', 'dxb3', 'dxb6'];

    fcKeys.forEach(fcKey => {
        const fc = data[fcKey];
        Object.values(fc.departments).forEach(items => {
            items.forEach(item => {
                const name = item.item.toLowerCase().trim();
                if (!itemMap[name]) {
                    itemMap[name] = { item: item.item, current: 0, required: 0 };
                }
                const c = parseInt(item.current);
                const r = parseInt(item.required);
                if (!isNaN(c)) itemMap[name].current += c;
                if (!isNaN(r)) itemMap[name].required += r;
            });
        });
    });

    return Object.values(itemMap).sort((a, b) => {
        const deltaA = a.current - a.required;
        const deltaB = b.current - b.required;
        return deltaA - deltaB;
    });
}

// ============ RENDERING ============

    if (fcKey === 'network') {
        renderNetwork();

        </div>
        <div class="summary-bar">
            <div class="summary-card">
                <div class="label">Total Items</div>
                <div class="value blue">${summary.totalItems}</div>
            </div>
            <div class="summary-card">
                <div class="label">In Shortage</div>
                <div class="value red">${summary.shortages}</div>
            </div>
            <div class="summary-card">
                <div class="label">Surplus</div>
                <div class="value green">${summary.surplus}</div>
            </div>
            <div class="summary-card">
                <div class="label">Total Gap</div>
                <div class="value amber">${summary.totalDeficit}</div>
            </div>
        </div>
        <div class="departments">
    `;

    Object.entries(fc.departments).forEach(([deptName, items]) => {
        html += `
            <div class="dept-card">

                    <h3>${deptName}</h3>
                    <span class="badge">${items.length} items</span>
                </div>
                <table class="dept-table">
                    <thead>
                        <tr>

                            <th style="text-align:center">Available</th>
                            <th style="text-align:center">Required</th>
                            <th style="text-align:center">Delta</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        items.forEach((item, idx) => {

    });

    html += `</div>`;

    // Notes
    if (fc.notes && fc.notes.length > 0) {

        `;
    }

    dashboard.innerHTML = html;
}

function renderNetwork() {
    const items = calculateNetworkTotal();
    const dashboard = document.getElementById('dashboard');

    let totalAvailable = 0, totalRequired = 0, shortageCount = 0, surplusCount = 0, onTrackCount = 0;
    items.forEach(item => {
        totalAvailable += item.current;
        totalRequired += item.required;
        const delta = item.required - item.current;
        if (delta > 0) shortageCount++;
        else if (delta < 0) surplusCount++;
        else onTrackCount++;
    });
    const totalGap = totalRequired - totalAvailable;
    const healthPercent = totalRequired > 0 ? Math.round((totalAvailable / totalRequired) * 100) : 100;

    // FC comparison data
    const fcKeys = ['auh1', 'dxb5', 'dxb3', 'dxb6'];
    const fcSummaries = fcKeys.map(key => {
        const fc = data[key];
        const summary = calculateSummary(fc);
        let avail = 0, req = 0;
        Object.values(fc.departments).forEach(items => {
            items.forEach(item => {
                const c = parseInt(item.current);
                const r = parseInt(item.required);
                if (!isNaN(c)) avail += c;
                if (!isNaN(r)) req += r;
            });
        });
        return { name: fc.name, ...summary, available: avail, required: req, health: req > 0 ? Math.round((avail / req) * 100) : 100 };
    });

    // Top 10 biggest gaps for bar chart
    const topGaps = items.filter(i => i.current - i.required < 0).slice(0, 10);
    const maxGap = topGaps.length > 0 ? topGaps[0].required : 1;

    // Donut segments
    const donutTotal = items.length;
    const shortPct = (shortageCount / donutTotal) * 100;
    const surplusPct = (surplusCount / donutTotal) * 100;
    const onTrackPct = (onTrackCount / donutTotal) * 100;

    let html = `
        <div class="fc-header">
            <h2>🌐 Network Total</h2>
        </div>
        <div class="summary-bar">
            <div class="summary-card">
                <div class="label">Unique Items</div>
                <div class="value blue">${items.length}</div>
            </div>
            <div class="summary-card">
                <div class="label">Total Available</div>
                <div class="value green">${totalAvailable.toLocaleString()}</div>
            </div>
            <div class="summary-card">
                <div class="label">Total Required</div>
                <div class="value amber">${totalRequired.toLocaleString()}</div>
            </div>
            <div class="summary-card">
                <div class="label">Network Gap</div>
                <div class="value red">${(-totalGap).toLocaleString()}</div>
            </div>
        </div>

        <!-- FC Comparison Cards -->
        <div class="fc-compare-grid">
    `;

    fcSummaries.forEach(fc => {
        const barColor = fc.health >= 90 ? '#16a34a' : fc.health >= 70 ? '#d97706' : '#dc2626';
        html += `
            <div class="fc-compare-card">
                <h4>${fc.name}</h4>
                <div class="fc-stat">
                    <div class="fc-stat-label">Readiness</div>
                    <div class="fc-stat-value" style="color: ${barColor}">${fc.health}%</div>
                </div>
                <div class="fc-stat">
                    <div class="fc-stat-label">Shortages</div>
                    <div class="fc-stat-value red">${fc.shortages}</div>
                </div>
                <div class="health-bar">
                    <div class="health-bar-fill" style="width: ${fc.health}%; background: ${barColor};"></div>
                </div>
            </div>
        `;
    });

    html += `</div>`;

    // Charts row
    html += `<div class="charts-row">`;

    // Bar chart — top gaps
    html += `
        <div class="chart-card">
            <h3>Top 10 Equipment Gaps</h3>
            <div class="bar-chart">
    `;

    topGaps.forEach(item => {
        const gap = item.current - item.required;
        const availPct = item.required > 0 ? Math.min((item.current / item.required) * 100, 100) : 100;
        html += `
            <div class="bar-row">
                <div class="bar-label" title="${item.item}">${item.item}</div>
                <div class="bar-container">
                    <div class="bar-fill-available" style="width: ${availPct}%"></div>
                </div>
                <div class="bar-value shortage">${gap}</div>
            </div>
        `;
    });

    html += `</div></div>`;

    // Donut chart — item status breakdown
    const circumference = 2 * Math.PI * 60;
    const shortLen = (shortageCount / donutTotal) * circumference;
    const surplusLen = (surplusCount / donutTotal) * circumference;
    const onTrackLen = (onTrackCount / donutTotal) * circumference;

    html += `
        <div class="chart-card">
            <h3>Item Status Breakdown</h3>
            <div class="donut-wrapper">
                <svg class="donut-svg" viewBox="0 0 160 160">
                    <circle cx="80" cy="80" r="60" fill="none" stroke="#dc2626" stroke-width="20"
                        stroke-dasharray="${shortLen} ${circumference - shortLen}" stroke-dashoffset="0"/>
                    <circle cx="80" cy="80" r="60" fill="none" stroke="#16a34a" stroke-width="20"
                        stroke-dasharray="${surplusLen} ${circumference - surplusLen}" stroke-dashoffset="${-shortLen}"/>
                    <circle cx="80" cy="80" r="60" fill="none" stroke="#94a3b8" stroke-width="20"
                        stroke-dasharray="${onTrackLen} ${circumference - onTrackLen}" stroke-dashoffset="${-(shortLen + surplusLen)}"/>
                    <text x="80" y="76" text-anchor="middle" fill="#1e293b" font-size="22" font-weight="700" transform="rotate(90 80 80)">${healthPercent}%</text>
                    <text x="80" y="94" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="500" transform="rotate(90 80 80)">Readiness</text>
                </svg>
                <div class="donut-legend">
                    <div class="legend-item"><div class="legend-dot red"></div>Shortage: ${shortageCount} items</div>
                    <div class="legend-item"><div class="legend-dot green"></div>Surplus: ${surplusCount} items</div>
                    <div class="legend-item"><div class="legend-dot gray"></div>On Track: ${onTrackCount} items</div>
                </div>
            </div>
        </div>
    `;

    html += `</div>`;

    // Table
    html += `
        <div class="network-table-wrapper">
            <div class="network-table-header">
                <h3>All Equipment — Combined Across Network</h3>
            </div>
            <table class="network-table">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th style="text-align:center">Total Available</th>
                        <th style="text-align:center">Total Required</th>
                        <th style="text-align:center">Delta</th>
                    </tr>
                </thead>
                <tbody>
    `;

    items.forEach(item => {
        html += `
            <tr>
                <td class="item-name">${item.item}</td>
                <td class="num">${item.current.toLocaleString()}</td>
                <td class="num">${item.required.toLocaleString()}</td>
                <td class="num">${formatDelta(item.current, item.required)}</td>
            </tr>
        `;
    });

    html += `</tbody></table></div>`;
    dashboard.innerHTML = html;
}

// ============ EDIT FUNCTIONS ============
function toggleEdit() {
    editMode = !editMode;
    const btn = document.getElementById('editBtn');
    if (editMode) {
        btn.textContent = '💾 Save & Exit';
        btn.classList.add('editing');
    } else {
        btn.textContent = '✏️ Edit Mode';
        btn.classList.remove('editing');
        saveData();
    }
    renderFC(currentFC);
}

function updateValue(fcKey, deptName, idx, field, value) {
    const numVal = parseInt(value);
    data[fcKey].departments[deptName][idx][field] = isNaN(numVal) ? 0 : numVal;
    saveData();
    renderFC(fcKey);
}

function showFC(fcKey, tabEl) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tabEl.classList.add('active');
    renderFC(fcKey);
}

// ============ DOWNLOAD REPORT ============
function downloadReport() {
    const fcKeys = ['auh1', 'dxb5', 'dxb3', 'dxb6'];
    let csv = 'Site,Department,Item,Available,Required,Delta\n';

    fcKeys.forEach(fcKey => {
        const fc = data[fcKey];
        Object.entries(fc.departments).forEach(([deptName, items]) => {
            items.forEach(item => {
                const c = parseInt(item.current) || 0;
                const r = parseInt(item.required) || 0;
                const delta = c - r;
                csv += `"${fc.name}","${deptName}","${item.item}",${c},${r},${delta}\n`;
            });
        });
    });

    // Add a blank line then network totals
    csv += '\n\nNetwork Total,,,,\n';
    csv += 'Item,Total Available,Total Required,Delta,\n';
    const networkItems = calculateNetworkTotal();
    networkItems.forEach(item => {
        const delta = item.current - item.required;
        csv += `"${item.item}",${item.current},${item.required},${delta},\n`;
    });

    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '4M-Tracker-Purchase-Report.csv';
    a.click();
    URL.revokeObjectURL(url);
}
