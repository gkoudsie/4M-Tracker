<head>

            padding: 0;

        }

        .header {

            align-items: center;
            justify-content: space-between;

            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 14px;
        }

        .header h1 {
            font-size: 22px;
            color: #1e293b;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header .subtitle {
            color: #94a3b8;
            font-size: 13px;
            font-weight: 400;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .edit-toggle {
            padding: 9px 20px;
            background: #6366f1;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .edit-toggle:hover {
            background: #4f46e5;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99,102,241,0.3);
        }

        .edit-toggle.editing {
            background: #10b981;
        }

        .edit-toggle.editing:hover {
            background: #059669;
            box-shadow: 0 4px 12px rgba(16,185,129,0.3);
        }

        .save-notice {
            font-size: 12px;
            color: #10b981;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .save-notice.show {
            opacity: 1;
        }

        .tabs {
            display: flex;
            gap: 4px;
            padding: 16px 40px 0;
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
        }

        .tab {
            padding: 11px 24px;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            border-radius: 0;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #64748b;
            transition: all 0.2s;
            font-family: inherit;
        }

        .tab:hover {
            color: #6366f1;
            background: #f8fafc;
        }

        .tab.active {
            color: #6366f1;
            border-bottom-color: #6366f1;
            font-weight: 600;
        }

        .dashboard {
            padding: 30px 40px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .fc-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .fc-header h2 {
            font-size: 28px;
            color: #1e293b;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .departments {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .dept-card {
            background: #fff;
            border-radius: 12px;

            border-bottom: 1px solid #e2e8f0;

            color: #1e293b;
            font-weight: 600;

            color: #6366f1;
            background: #eef2ff;

            border-radius: 12px;
            font-weight: 500;

            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
            font-weight: 600;
            border-bottom: 1px solid #f1f5f9;

            font-size: 13px;
            border-bottom: 1px solid #f8fafc;

            border-radius: 4px;

            font-weight: 600;

            font-size: 13px;
            border-bottom: 1px solid #f8fafc;

            text-align: center;
            font-weight: 600;
            color: #334155;
        }

            .tabs { padding: 12px 20px 0; overflow-x: auto; }
            .dashboard { padding: 20px; }

            .tab { padding: 10px 16px; font-size: 13px; white-space: nowrap; }
            .summary-bar { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>

// ============ STATE ============
let editMode = false;
let currentFC = 'auh1';

function loadData() {
    const saved = localStorage.getItem('4m-tracker-data');
    if (saved) return JSON.parse(saved);
    return JSON.parse(JSON.stringify(defaultData));
}

function saveData() {
    localStorage.setItem('4m-tracker-data', JSON.stringify(data));
    const notice = document.getElementById('saveNotice');
    notice.classList.add('show');
    setTimeout(() => notice.classList.remove('show'), 2000);
}

let data = loadData();

// ============ HELPERS ============
function getDeltaClass(delta) {
    if (delta === null || delta === undefined || isNaN(delta)) return 'delta-zero';
    if (delta > 0) return 'delta-positive';
    if (delta < 0) return 'delta-negative';
    return 'delta-zero';
}

function formatDelta(current, required) {
    const c = parseInt(current);
    const r = parseInt(required);
    if (isNaN(c) || isNaN(r)) return '<span class="delta-zero">—</span>';
    const delta = r - c;
    if (delta === 0) return '<span class="delta-zero">0</span>';
    const prefix = delta > 0 ? '+' : '';
    return `<span class="${getDeltaClass(delta)}">${prefix}${delta}</span>`;
}

function calculateSummary(fc) {
    let totalItems = 0, shortages = 0, surplus = 0, totalDeficit = 0;
    Object.values(fc.departments).forEach(items => {
        items.forEach(item => {
            totalItems++;
            const c = parseInt(item.current);
            const r = parseInt(item.required);
            if (!isNaN(c) && !isNaN(r)) {
                const delta = r - c;
                if (delta > 0) { shortages++; totalDeficit += delta; }
                else if (delta < 0) { surplus++; }
            }
        });
    });
    return { totalItems, shortages, surplus, totalDeficit };
}

// ============ NETWORK TOTAL ============
function calculateNetworkTotal() {
    const itemMap = {};
    const fcKeys = ['auh1', 'dxb5', 'dxb3', 'dxb6'];

    fcKeys.forEach(fcKey => {
        const fc = data[fcKey];
        Object.values(fc.departments).forEach(items => {
            items.forEach(item => {
                const name = item.item.toLowerCase().trim();
                if (!itemMap[name]) {
                    itemMap[name] = { item: item.item, current: 0, required: 0 };
                }
                const c = parseInt(item.current);
                const r = parseInt(item.required);
                if (!isNaN(c)) itemMap[name].current += c;
                if (!isNaN(r)) itemMap[name].required += r;
            });
        });
    });

    return Object.values(itemMap).sort((a, b) => {
        const deltaA = a.required - a.current;
        const deltaB = b.required - b.current;
        return deltaB - deltaA;
    });
}

// ============ RENDERING ============

                    </thead>

        `;

                        <td class="num"><input type="number" class="edit-input" value="${item.required}" onchange="updateValue('${fcKey}', '${deptName}', ${idx}, 'required', this.value)"></td>
                        <td class="num">${formatDelta(item.current, item.required)}</td>
                    </tr>
                `;
            } else {
                html += `
                    <tr>
                        <td class="item-name">${item.item}</td>
                        <td class="num">${item.current}</td>
                        <td class="num">${item.required}</td>
                        <td class="num">${formatDelta(item.current, item.required)}</td>

                `;

        });

        html += `</tbody></table></div>`;
    });

    html += `</div>`;

    // Notes
    if (fc.notes && fc.notes.length > 0) {
        html += `
            <div class="notes-section">
                <h4>⚠️ Notes</h4>
                ${fc.notes.map(n => `<p>• ${n}</p>`).join('')}

function renderNetwork() {
    const items = calculateNetworkTotal();
    const dashboard = document.getElementById('dashboard');

    let totalAvailable = 0, totalRequired = 0, shortageCount = 0;
    items.forEach(item => {
        totalAvailable += item.current;
        totalRequired += item.required;
        if (item.required - item.current > 0) shortageCount++;
    });
    const totalGap = totalRequired - totalAvailable;

    let html = `
        <div class="fc-header">
            <h2>🌐 Network Total (All FCs)</h2>
        </div>
        <div class="summary-bar">
            <div class="summary-card">
                <div class="label">Unique Items</div>
                <div class="value blue">${items.length}</div>
            </div>
            <div class="summary-card">
                <div class="label">Total Available</div>
                <div class="value green">${totalAvailable.toLocaleString()}</div>
            </div>
            <div class="summary-card">
                <div class="label">Total Required</div>
                <div class="value amber">${totalRequired.toLocaleString()}</div>
            </div>
            <div class="summary-card">
                <div class="label">Network Gap</div>
                <div class="value red">+${totalGap.toLocaleString()}</div>
            </div>
        </div>
        <div class="network-table-wrapper">
            <div class="network-table-header">
                <h3>Combined Equipment Across AUH1, DXB5, DXB3, DXB6</h3>
            </div>
            <table class="network-table">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th style="text-align:center">Total Available</th>
                        <th style="text-align:center">Total Required</th>
                        <th style="text-align:center">Delta</th>
                    </tr>
                </thead>
                <tbody>
    `;

    items.forEach(item => {
        html += `
            <tr>
                <td class="item-name">${item.item}</td>
                <td class="num">${item.current.toLocaleString()}</td>
                <td class="num">${item.required.toLocaleString()}</td>
                <td class="num">${formatDelta(item.current, item.required)}</td>
            </tr>
        `;
    });

    html += `</tbody></table></div>`;
    dashboard.innerHTML = html;
}

// ============ EDIT FUNCTIONS ============
function toggleEdit() {
    editMode = !editMode;
    const btn = document.getElementById('editBtn');
    if (editMode) {
        btn.textContent = '💾 Save & Exit';
        btn.classList.add('editing');
    } else {
        btn.textContent = '✏️ Edit Mode';
        btn.classList.remove('editing');
        saveData();
    }
    renderFC(currentFC);
}

function updateValue(fcKey, deptName, idx, field, value) {
    const numVal = parseInt(value);
    data[fcKey].departments[deptName][idx][field] = isNaN(numVal) ? 0 : numVal;
    saveData();
    renderFC(fcKey);
}

function showFC(fcKey, tabEl) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tabEl.classList.add('active');
    renderFC(fcKey);
}

// ============ INITIAL RENDER ============
renderFC('auh1');
    </script>
